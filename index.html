<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parlamento Italiano — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Josefin+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    /* ── VARIABILI ── */
    :root {
      --bg:         #0b0f18;
      --surface:    #111827;
      --surface2:   #1a2540;
      --border:     rgba(201, 168, 76, 0.18);
      --border-hov: rgba(201, 168, 76, 0.5);
      --gold:       #c9a84c;
      --gold-dim:   #8a6f2e;
      --text:       #e8e2d5;
      --text-dim:   #7a7264;
      --text-mid:   #a89c8a;
      --cam-col:    #3a7fd4;
      --cam-dark:   #1a3a6b;
      --sen-col:    #d44a4a;
      --sen-dark:   #6b1a1a;
      --badge-seduta:      rgba(58,127,212,.18);
      --badge-atto:        rgba(201,168,76,.15);
      --badge-votazione:   rgba(212,74,74,.18);
      --badge-comunicato:  rgba(60,180,120,.15);
      --badge-commissione: rgba(160,80,200,.15);
      --badge-legge:       rgba(201,168,76,.2);
      --badge-mozione:     rgba(240,140,40,.15);
      --badge-interpellanza: rgba(80,160,200,.15);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: .4;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky; top: 0;
      background: rgba(11,15,24,.92);
      backdrop-filter: blur(16px);
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      letter-spacing: .18em;
      color: var(--gold);
      text-transform: uppercase;
      display: flex; align-items: center; gap: .6rem;
    }
    .logo-flag { display: flex; gap: 2px; }
    .logo-flag span {
      width: 4px; height: 16px; border-radius: 1px;
    }
    .flag-g { background: #009246; }
    .flag-w { background: #f1f2f1; }
    .flag-r { background: #ce2b37; }

    .last-update {
      font-size: .7rem;
      color: var(--text-dim);
      letter-spacing: .08em;
    }
    .last-update span { color: var(--gold-dim); }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      padding: .75rem 2rem;
      font-size: .72rem;
      letter-spacing: .12em;
      color: var(--text-dim);
      display: flex; align-items: center; gap: .5rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .breadcrumb a {
      color: var(--gold-dim);
      text-decoration: none;
      text-transform: uppercase;
      transition: color .2s;
      cursor: pointer;
    }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb .sep { opacity: .3; }
    .breadcrumb .current { color: var(--text-mid); text-transform: uppercase; }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* ── HOME: SELEZIONE RAMO ── */
    .home-intro {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeUp .6s ease both;
    }
    .home-intro h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 600;
      letter-spacing: .12em;
      color: var(--text);
      margin-bottom: .75rem;
    }
    .home-intro p {
      color: var(--text-dim);
      font-size: .82rem;
      letter-spacing: .06em;
    }

    .ramo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .ramo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem 2rem;
      cursor: pointer;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      position: relative;
      overflow: hidden;
      animation: fadeUp .6s ease both;
      text-align: center;
    }
    .ramo-card:nth-child(2) { animation-delay: .1s; }
    .ramo-card::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity .3s;
    }
    .ramo-card.cam::before { background: radial-gradient(circle at 50% 0%, rgba(58,127,212,.12), transparent 70%); }
    .ramo-card.sen::before { background: radial-gradient(circle at 50% 0%, rgba(212,74,74,.12), transparent 70%); }
    .ramo-card:hover { border-color: var(--border-hov); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,.4); }
    .ramo-card:hover::before { opacity: 1; }

    .ramo-icon {
      font-size: 2.4rem;
      margin-bottom: 1rem;
      line-height: 1;
    }
    .ramo-card h2 {
      font-family: 'Cinzel', serif;
      font-size: .92rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: .5rem;
    }
    .ramo-card.cam h2 { color: var(--cam-col); }
    .ramo-card.sen h2 { color: var(--sen-col); }
    .ramo-count {
      font-size: .72rem;
      color: var(--text-dim);
      letter-spacing: .08em;
      margin-top: .75rem;
    }
    .ramo-count strong { color: var(--gold-dim); }

    /* ── VISTA RAMO: FILTRI + LISTA ── */
    .ramo-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem;
      animation: fadeUp .4s ease both;
    }
    .ramo-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .ramo-header.cam h2 { color: var(--cam-col); }
    .ramo-header.sen h2 { color: var(--sen-col); }

    .filter-bar {
      display: flex; gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
      animation: fadeUp .4s ease .1s both;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-mid);
      padding: .35rem .9rem;
      border-radius: 2px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--border-hov); color: var(--text); }
    .filter-btn.active {
      background: var(--surface2);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── CARDS NOTIZIE ── */
    .items-grid { display: flex; flex-direction: column; gap: .75rem; }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 1rem;
      transition: border-color .2s, transform .15s;
      animation: fadeUp .4s ease both;
      text-decoration: none;
      color: inherit;
    }
    .news-card:hover {
      border-color: var(--border-hov);
      transform: translateX(4px);
    }

    .card-left {}
    .card-top {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: .5rem;
    }
    .tipo-badge {
      font-size: .62rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .2rem .55rem;
      border-radius: 2px;
      font-weight: 600;
    }
    .badge-seduta      { background: var(--badge-seduta);      color: var(--cam-col); }
    .badge-votazione   { background: var(--badge-votazione);   color: var(--sen-col); }
    .badge-atto        { background: var(--badge-atto);        color: var(--gold); }
    .badge-legge       { background: var(--badge-legge);       color: #e0b84a; }
    .badge-mozione     { background: var(--badge-mozione);     color: #f08828; }
    .badge-proposta    { background: var(--badge-atto);        color: var(--gold); }
    .badge-interpellanza { background: var(--badge-interpellanza); color: #50a0c8; }
    .badge-interrogazione { background: var(--badge-interpellanza); color: #50a0c8; }
    .badge-comunicato  { background: var(--badge-comunicato);  color: #3cb478; }
    .badge-commissione { background: var(--badge-commissione); color: #a050c8; }
    .badge-risoluzione { background: var(--badge-atto);        color: var(--gold); }

    .card-date {
      font-size: .68rem;
      color: var(--text-dim);
      letter-spacing: .06em;
    }
    .news-card h3 {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .9rem;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: .35rem;
    }
    .card-desc {
      font-size: .75rem;
      color: var(--text-dim);
      line-height: 1.6;
      letter-spacing: .02em;
    }
    .card-link {
      align-self: center;
      color: var(--gold-dim);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: color .2s;
    }
    .news-card:hover .card-link { color: var(--gold); }

    /* ── LOADING / EMPTY / ERROR ── */
    .state-msg {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      animation: fadeUp .4s ease both;
    }
    .state-msg .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      margin: 0 auto 1rem;
      animation: spin 1s linear infinite;
    }

    /* ── DIVIDER DECORATIVO ── */
    .section-divider {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem;
      animation: fadeUp .4s ease both;
    }
    .section-divider span {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .2em;
      color: var(--text-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }


    /* ── FILTRO DATA ── */
    .date-filter-bar {
      display: flex; align-items: center; gap: .75rem;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
      animation: fadeUp .4s ease .15s both;
    }
    .date-filter-label {
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .date-presets { display: flex; gap: .4rem; flex-wrap: wrap; }
    .date-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-mid);
      padding: .3rem .75rem;
      border-radius: 2px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: .68rem;
      letter-spacing: .09em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .date-btn:hover { border-color: var(--border-hov); color: var(--text); }
    .date-btn.active { background: var(--surface2); border-color: var(--gold); color: var(--gold); }
    .date-separator {
      width: 1px; height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }
    .date-inputs { display: flex; align-items: center; gap: .4rem; }
    .date-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-mid);
      padding: .28rem .6rem;
      border-radius: 2px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: .68rem;
      letter-spacing: .04em;
      cursor: pointer;
      transition: border-color .2s;
      width: 120px;
    }
    .date-input:focus { outline: none; border-color: var(--gold-dim); color: var(--text); }
    .date-input::-webkit-calendar-picker-indicator { filter: invert(.4); cursor: pointer; }
    .date-range-sep { font-size: .65rem; color: var(--text-dim); }

    /* ── RIASSUNTO AI ── */
    .card-actions {
      display: flex; align-items: center; gap: .6rem;
      margin-top: .75rem;
    }
    .btn-riassumi {
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold-dim);
      padding: .28rem .75rem;
      border-radius: 2px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      display: inline-flex; align-items: center; gap: .4rem;
    }
    .btn-riassumi:hover:not(:disabled) {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,.06);
    }
    .btn-riassumi:disabled { opacity: .5; cursor: not-allowed; }
    .btn-riassumi .btn-spin {
      width: 10px; height: 10px;
      border: 1.5px solid rgba(201,168,76,.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex-shrink: 0;
    }
    .summary-box {
      margin-top: .75rem;
      background: rgba(201,168,76,.05);
      border: 1px solid rgba(201,168,76,.2);
      border-left: 3px solid var(--gold-dim);
      border-radius: 0 3px 3px 0;
      padding: .85rem 1rem;
      font-size: .8rem;
      line-height: 1.75;
      color: var(--text-mid);
      animation: fadeUp .35s ease both;
    }
    .summary-box .summary-label {
      color: var(--gold-dim);
      font-size: .6rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      display: block;
      margin-bottom: .45rem;
      font-weight: 600;
    }
    .summary-error {
      color: #c06060;
      font-size: .72rem;
      margin-top: .5rem;
      font-style: italic;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .ramo-grid { grid-template-columns: 1fr; }
      main { padding: 1.5rem 1rem 3rem; }
      .ramo-header { flex-direction: column; align-items: flex-start; gap: .5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-flag">
      <span class="flag-g"></span>
      <span class="flag-w"></span>
      <span class="flag-r"></span>
    </div>
    Parlamento Italiano — Dashboard
  </div>
  <div class="last-update" id="lastUpdate">Caricamento...</div>
</header>

<div class="breadcrumb" id="breadcrumb">
  <span class="current">Nazionale</span>
</div>

<main id="app">
  <div class="state-msg"><div class="spinner"></div>Connessione al database...</div>
</main>

<!-- ══════════════════════════════════════════════════════════════════════════
     FIREBASE CONFIG
     Sostituisci i valori sotto con quelli del tuo progetto Firebase.
     Trovi questi valori su: Firebase Console → Impostazioni progetto → App web
     ══════════════════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, orderBy, limit, getDocs, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ▼▼▼ INCOLLA QUI LA TUA CONFIG FIREBASE ▼▼▼
  const firebaseConfig = {
    apiKey:            "AIzaSyArNhbyj_HDtPripwDCG-sjbw2CvcQu9Ok",
    authDomain:        "parlamento-dashboard.firebaseapp.com",
    projectId:         "parlamento-dashboard",
    storageBucket:     "parlamento-dashboard.firebasestorage.app",
    messagingSenderId: "111190618195",
    appId:             "1:111190618195:web:057005348e1736d2e096a6",
  };
  // ▲▲▲ FINE CONFIG ▲▲▲

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── STATO APP ──────────────────────────────────────────────────────────────
  let state = {
    view:        'home',   // 'home' | 'camera' | 'senato'
    filtroTipo:  'tutti',
    filtroData:  'tutto',  // 'oggi' | 'settimana' | 'mese' | 'trimestre' | 'tutto' | 'custom'
    dataFrom:    '',
    dataTo:      '',
    items:       [],
    allItems:    [],       // tutti gli elementi caricati (prima del filtro data)
    counts:      { camera: 0, senato: 0 },
    loading:     false,
  };

  const DATE_PRESETS = [
    { key: 'oggi',       label: 'Oggi',         days: 0 },
    { key: 'settimana',  label: '7 giorni',      days: 7 },
    { key: 'mese',       label: '30 giorni',     days: 30 },
    { key: 'trimestre',  label: '90 giorni',     days: 90 },
    { key: 'tutto',      label: 'Tutto',         days: -1 },
  ];

  function getDateRange(preset, from, to) {
    const now = new Date();
    if (preset === 'custom') {
      return {
        from: from ? new Date(from + 'T00:00:00') : null,
        to:   to   ? new Date(to   + 'T23:59:59') : null,
      };
    }
    if (preset === 'tutto' || preset === '') return { from: null, to: null };
    const p = DATE_PRESETS.find(d => d.key === preset);
    if (!p || p.days < 0) return { from: null, to: null };
    if (p.days === 0) {
      const start = new Date(now); start.setHours(0,0,0,0);
      return { from: start, to: now };
    }
    const start = new Date(now);
    start.setDate(start.getDate() - p.days);
    start.setHours(0,0,0,0);
    return { from: start, to: now };
  }

  function applyDateFilter(items) {
    const { from, to } = getDateRange(state.filtroData, state.dataFrom, state.dataTo);
    if (!from && !to) return items;
    return items.filter(item => {
      const d = item.data?.toDate ? item.data.toDate() : new Date(item.data || 0);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    });
  }

  const TIPI_CAMERA = ['tutti','seduta','votazione','legge','proposta','mozione','interpellanza','interrogazione','risoluzione','atto'];
  const TIPI_SENATO = ['tutti','seduta','commissione','legge','mozione','agenda','atto','comunicato'];

  // ── HELPERS ────────────────────────────────────────────────────────────────

  function formatDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' });
  }

  function badgeClass(tipo) {
    const map = {
      seduta:'badge-seduta', votazione:'badge-votazione',
      atto:'badge-atto', legge:'badge-legge', proposta:'badge-proposta',
      mozione:'badge-mozione', interpellanza:'badge-interpellanza',
      interrogazione:'badge-interrogazione', risoluzione:'badge-risoluzione',
      comunicato:'badge-comunicato', commissione:'badge-commissione',
      agenda:'badge-seduta', proposta:'badge-proposta',
    };
    return map[tipo] || 'badge-atto';
  }

  function tipoLabel(tipo) {
    const map = {
      seduta:'Seduta', votazione:'Votazione', atto:'Atto', legge:'Legge',
      proposta:'PDL', mozione:'Mozione', interpellanza:'Interpellanza',
      interrogazione:'Interrogazione', risoluzione:'Risoluzione',
      comunicato:'Comunicato', commissione:'Commissione', agenda:'Agenda',
    };
    return map[tipo] || tipo;
  }

  // ── FIREBASE QUERIES ───────────────────────────────────────────────────────

  async function loadCounts() {
    try {
      const snap = await getDoc(doc(db, 'meta', 'status'));
      if (snap.exists()) {
        const d = snap.data();
        const lu = d.lastUpdated?.toDate();
        if (lu) {
          document.getElementById('lastUpdate').innerHTML =
            `Aggiornato: <span>${lu.toLocaleString('it-IT', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })}</span>`;
        }
      }
    } catch(e) { console.warn('meta:', e.message); }

    // Conta per Camera e Senato
    for (const fonte of ['camera','senato']) {
      try {
        const q = query(collection(db,'notizie'), where('fonte','==',fonte), limit(1));
        await getDocs(q); // Solo verifica connessione
        const qAll = query(collection(db,'notizie'), where('fonte','==',fonte), limit(200));
        const s = await getDocs(qAll);
        state.counts[fonte] = s.size;
      } catch(e) { console.warn(`count ${fonte}:`, e.message); }
    }
  }

  async function loadItems(fonte, tipo) {
    state.loading = true;
    renderApp();
    try {
      const constraints = [
        where('fonte', '==', fonte),
        limit(400),
      ];
      if (tipo && tipo !== 'tutti') {
        constraints.push(where('tipo', '==', tipo));
      }
      const q = query(collection(db, 'notizie'), ...constraints);
      const snap = await getDocs(q);
      let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      items.sort((a, b) => {
        const ta = a.data?.toMillis ? a.data.toMillis() : 0;
        const tb = b.data?.toMillis ? b.data.toMillis() : 0;
        return tb - ta;
      });
      state.allItems = items;
      state.items = applyDateFilter(items).slice(0, 80);
    } catch(e) {
      console.error('loadItems:', e.message);
      state.allItems = [];
      state.items = [];
    }
    state.loading = false;
    renderApp();
  }

  function setFiltroData(preset, from, to) {
    state.filtroData = preset;
    if (from !== undefined) state.dataFrom = from;
    if (to   !== undefined) state.dataTo   = to;
    state.items = applyDateFilter(state.allItems).slice(0, 80);
    renderApp();
  }
  window.setFiltroData = (preset) => setFiltroData(preset);
  window.setDateRange  = () => {
    const f = document.getElementById('date-from')?.value || '';
    const t = document.getElementById('date-to')?.value   || '';
    setFiltroData('custom', f, t);
  };

  // ── NAVIGAZIONE ───────────────────────────────────────────────────────────

  function navigate(view, tipo) {
    state.view = view;
    state.filtroTipo = tipo || 'tutti';
    state.items = [];
    updateBreadcrumb();
    if (view === 'home') {
      renderApp();
    } else {
      loadItems(view, state.filtroTipo);
    }
  }

  function setFiltro(tipo) {
    state.filtroTipo = tipo;
    loadItems(state.view, tipo);
  }

  function updateBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    if (state.view === 'home') {
      bc.innerHTML = `<span class="current">Nazionale</span>`;
    } else {
      const label = state.view === 'camera' ? 'Camera dei Deputati' : 'Senato della Repubblica';
      bc.innerHTML = `
        <a onclick="window.goHome()">Nazionale</a>
        <span class="sep">›</span>
        <span class="current">${label}</span>
      `;
    }
  }

  window.goHome = () => navigate('home');
  window.goTo   = (v) => navigate(v);
  window.setFiltro = (t) => setFiltro(t);

  // ── RENDER ─────────────────────────────────────────────────────────────────

  function renderApp() {
    const app = document.getElementById('app');
    if (state.view === 'home') {
      app.innerHTML = renderHome();
    } else {
      app.innerHTML = renderRamo();
    }
  }

  function renderHome() {
    return `
      <div class="home-intro">
        <h1>Lavori Parlamentari</h1>
        <p>Seleziona il ramo del Parlamento per esplorare gli atti recenti</p>
      </div>
      <div class="ramo-grid">
        <div class="ramo-card cam" onclick="goTo('camera')">
          <div class="ramo-icon">🏛</div>
          <h2>Camera dei Deputati</h2>
          <p style="font-size:.75rem;color:var(--text-mid);letter-spacing:.05em;margin-top:.25rem;">
            Atti · Sedute · Votazioni · Proposte
          </p>
          <div class="ramo-count">
            <strong>${state.counts.camera || '—'}</strong> elementi recenti
          </div>
        </div>
        <div class="ramo-card sen" onclick="goTo('senato')">
          <div class="ramo-icon">⚖️</div>
          <h2>Senato della Repubblica</h2>
          <p style="font-size:.75rem;color:var(--text-mid);letter-spacing:.05em;margin-top:.25rem;">
            Comunicati · Commissioni · Sedute
          </p>
          <div class="ramo-count">
            <strong>${state.counts.senato || '—'}</strong> elementi recenti
          </div>
        </div>
      </div>
    `;
  }

  function renderRamo() {
    const isCamera = state.view === 'camera';
    const label = isCamera ? 'Camera dei Deputati' : 'Senato della Repubblica';
    const colClass = isCamera ? 'cam' : 'sen';
    const tipi = isCamera ? TIPI_CAMERA : TIPI_SENATO;

    const filtroBtns = tipi.map(t =>
      `<button class="filter-btn ${state.filtroTipo===t?'active':''}" onclick="setFiltro('${t}')">
        ${t === 'tutti' ? 'Tutti' : tipoLabel(t)}
      </button>`
    ).join('');

    let itemsHTML;
    if (state.loading) {
      itemsHTML = `<div class="state-msg"><div class="spinner"></div>Caricamento...</div>`;
    } else if (!state.items.length) {
      itemsHTML = `<div class="state-msg">Nessun elemento trovato per questo filtro</div>`;
    } else {
      itemsHTML = `<div class="items-grid">
        ${state.items.map((item, i) => renderCard(item, i)).join('')}
      </div>`;
    }

    const dateBtns = DATE_PRESETS.map(p =>
      `<button class="date-btn ${state.filtroData===p.key?'active':''}" onclick="setFiltroData('${p.key}')">${p.label}</button>`
    ).join('');

    const dateInputs = `
      <div class="date-inputs">
        <input type="date" id="date-from" class="date-input"
          value="${state.dataFrom}" onchange="window.setDateRange()"
          title="Data inizio">
        <span class="date-range-sep">→</span>
        <input type="date" id="date-to" class="date-input"
          value="${state.dataTo}" onchange="window.setDateRange()"
          title="Data fine">
      </div>`;

    const totalFiltered = state.items.length;
    const totalAll = state.allItems.length;
    const countLabel = state.filtroData !== 'tutto'
      ? `${totalFiltered} di ${totalAll} elementi`
      : `${totalFiltered} elementi`;

    return `
      <div class="ramo-header ${colClass}">
        <h2>${label}</h2>
        <div style="font-size:.7rem;color:var(--text-dim);letter-spacing:.06em;">${countLabel}</div>
      </div>
      <div class="section-divider"><span>Filtra per tipo</span></div>
      <div class="filter-bar">${filtroBtns}</div>
      <div class="section-divider"><span>Filtra per data</span></div>
      <div class="date-filter-bar">
        <div class="date-presets">${dateBtns}</div>
        <div class="date-separator"></div>
        ${dateInputs}
      </div>
      ${itemsHTML}
    `;
  }

  // Mappa riassunti già generati: id -> testo
  const summaryCache = {};

  // Mappa globale degli item per ID (usata dal bottone riassumi)
  const itemRegistry = {};

  function renderCard(item, i) {
    const delay = Math.min(i * 40, 400);
    const title  = item.titolo || 'Nessun titolo';
    const date   = formatDate(item.data);
    const desc   = item.descrizione || '';
    const link   = item.link || '#';
    const tipo   = item.tipo || 'atto';
    const itemId = (item.id || slugify(title)).replace(/[^a-z0-9-]/gi, '-');

    // Registra l'item per recuperarlo al click senza passare dati inline
    itemRegistry[itemId] = { titolo: title, descrizione: desc, link };

    const cachedSummary = summaryCache[itemId];
    const summaryHTML = cachedSummary
      ? `<div class="summary-box"><span class="summary-label">✦ Riassunto AI</span>${cachedSummary}</div>`
      : '';

    return `
      <div class="news-card" style="animation-delay:${delay}ms; animation: fadeUp .4s ease both; display:grid; grid-template-columns:1fr;">
        <div style="display:grid; grid-template-columns:1fr auto; align-items:start; gap:1rem;">
          <div class="card-left">
            <div class="card-top">
              <span class="tipo-badge ${badgeClass(tipo)}">${tipoLabel(tipo)}</span>
              <span class="card-date">${date}</span>
            </div>
            <h3>${title}</h3>
            ${desc ? `<p class="card-desc">${desc}</p>` : ''}
          </div>
          <a href="${link}" target="_blank" rel="noopener" class="card-link" style="padding-top:.2rem">↗</a>
        </div>
        <div class="card-actions">
          <button class="btn-riassumi" id="btn-${itemId}" data-id="${itemId}" onclick="riassumi(this.dataset.id)">
            ✦ Riassumi
          </button>
        </div>
        <div id="summary-${itemId}">${summaryHTML}</div>
      </div>
    `;
  }

  function slugify(str) {
    return (str || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 60);
  }

  // ── LIMITE GIORNALIERO ─────────────────────────────────────────────────────
  const DAILY_LIMIT = 15; // riassunti al giorno per utente

  function getRateData() {
    try {
      const raw = localStorage.getItem('parlamento_rate');
      if (!raw) return { date: '', count: 0 };
      return JSON.parse(raw);
    } catch { return { date: '', count: 0 }; }
  }

  function incrementRate() {
    const today = new Date().toISOString().split('T')[0];
    const data = getRateData();
    const count = (data.date === today ? data.count : 0) + 1;
    localStorage.setItem('parlamento_rate', JSON.stringify({ date: today, count }));
    return count;
  }

  function getRemainingToday() {
    const today = new Date().toISOString().split('T')[0];
    const data = getRateData();
    if (data.date !== today) return DAILY_LIMIT;
    return Math.max(0, DAILY_LIMIT - data.count);
  }

  window.riassumi = async function(itemId) {
    const reg = itemRegistry[itemId] || {};
    const titolo = reg.titolo || itemId;
    const descrizione = reg.descrizione || '';
    const link = reg.link || '';
    const btn = document.getElementById(`btn-${itemId}`);
    const box = document.getElementById(`summary-${itemId}`);
    if (!btn || !box) return;

    // Toggle: se già mostrato, nascondi
    if (summaryCache[itemId]) {
      box.innerHTML = '';
      delete summaryCache[itemId];
      btn.innerHTML = '✦ Riassumi';
      btn.disabled = false;
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spin"></span> Analisi...';

    const prompt = `Sei un assistente specializzato in diritto parlamentare italiano. 
Analizza questo atto parlamentare e fornisci:
1. Una spiegazione chiara e accessibile in 2-3 frasi (cosa è, cosa propone o cosa è successo)
2. Il potenziale impatto sui cittadini italiani (1-2 frasi)

Titolo: ${titolo}
${descrizione ? 'Descrizione: ' + descrizione : ''}
${link ? 'Fonte: ' + link : ''}

Rispondi in italiano, in modo chiaro e diretto, senza usare termini tecnici non necessari. Massimo 120 parole.`;

    // Controlla limite giornaliero
    const remaining = getRemainingToday();
    if (remaining <= 0) {
      box.innerHTML = `<p class="summary-error">⚠ Limite giornaliero di ${DAILY_LIMIT} riassunti raggiunto. Torna domani!</p>`;
      btn.innerHTML = '✦ Riassumi';
      btn.disabled = false;
      return;
    }

    // Incrementa contatore prima della chiamata
    const usedToday = incrementRate();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          messages: [{ role: 'user', content: prompt }],
        }),
      });

      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      const text = data?.content?.[0]?.text || 'Nessuna risposta ricevuta.';

      summaryCache[itemId] = text;
      const leftAfter = getRemainingToday();
      const limitNote = leftAfter <= 3 ? `<span style="font-size:.6rem;color:var(--gold-dim);opacity:.7;display:block;margin-top:.5rem">Riassunti rimanenti oggi: ${leftAfter}/${DAILY_LIMIT}</span>` : '';
      box.innerHTML = `<div class="summary-box"><span class="summary-label">✦ Riassunto AI</span>${text}${limitNote}</div>`;
      btn.innerHTML = '✦ Nascondi';
      btn.disabled = false;
    } catch (e) {
      box.innerHTML = `<p class="summary-error">Errore nel generare il riassunto: ${e.message}</p>`;
      btn.innerHTML = '✦ Riassumi';
      btn.disabled = false;
    }
  };

  // ── INIT ───────────────────────────────────────────────────────────────────
  (async () => {
    renderApp();
    await loadCounts();
    renderApp();
  })();
</script>
</body>
</html>
